spring:
  datasource:
    url: jdbc:h2:mem:bioimpedance_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  ssl:
    enabled: false

jwt:
  secret: test-secret-key-for-context-loads-1234567890
  expiration: 900000
  refresh-expiration: 604800000

cookie:
  secure: false

stripe:
  secret-key:
  webhook-secret:
  success-url: http://localhost:5173/payments?billing=success
  cancel-url: http://localhost:5173/payments?billing=cancelled
  portal-return-url: http://localhost:5173/payments
  prices:
    basic:
    pro:
    studio:

logging:
  level:
    root: WARN
